<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="장충교회 제자훈련 기말시험">
    <meta property="og:description" content="구글 스프레드시트와 연동된 성경 암기 연습 프로그램">
    <meta property="og:type" content="website">

    <title>장충교회 제자훈련 기말시험</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 💡 수정 1: 이중 스크롤 방지. body의 높이 제한(100vh)을 풀고 자연스럽게 늘어나게 함 */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f9f9f9; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* 화면을 덮되 내용이 많으면 자연스럽게 스크롤됨 */
            padding: 20px;
        }

        /* 💡 수정 3: h1(타이틀)은 모드 선택 화면에서만 보이도록 이동 */
        h1 { 
            font-size: 26px; 
            margin-bottom: 25px;
            color: #333; 
            word-break: keep-all; 
        }

        #mode-selection {
            margin: auto;
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #mode-selection h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #555;
        }

        #main-app, #all-verses-view { 
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex; 
            flex-direction: column;
        }

        /* 상단 컨트롤 영역 */
        .controls {
            display: flex;
            gap: 8px; /* 버튼이 3개로 늘어났으므로 간격 살짝 조정 */
            width: 100%;
            margin-bottom: 10px; 
        }

        button { 
            padding: 12px 5px; /* 모바일에서 3개 버튼이 잘리도록 않게 좌우 여백 조정 */
            font-size: 15px; 
            cursor: pointer; 
            border-radius: 5px; 
            border: none; 
            background: #007bff; 
            color: white; 
            font-weight: bold; 
        }
        
        #mode-selection button { width: 100%; padding: 15px 10px; }
        
        button:hover { background: #0056b3; }
        button.btn-all { background: #28a745; }
        button.btn-all:hover { background: #218838; }
        
        .controls button { flex: 1; }
        
        button.btn-home { background: #6c757d; }
        button.btn-home:hover { background: #5a6268; }
        
        /* 💡 추가: 이전 버튼 색상 (조금 다른 파란색/회색 계열로 구분) */
        button.btn-prev { background: #17a2b8; }
        button.btn-prev:hover { background: #138496; }

        .hint-text { 
            color: #aaa; 
            margin-bottom: 15px; 
            font-size: 13px; 
            word-break: keep-all; 
        }

        /* 💡 수정 2: 내부 스크롤(overflow-y) 제거. 최소 높이만 주어 모바일 화면을 덮도록 설정 */
        #verse-box { 
            width: 100%;
            min-height: 60vh; /* 화면의 60% 정도는 항상 차지하도록 함 */
            padding: 30px 20px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; 
        }
        
        #info { 
            font-size: 18px; 
            color: #222; 
            font-weight: bold; 
            margin-bottom: 25px; 
            background: #f0f0f0;
            padding: 6px 16px;
            border-radius: 20px;
        }

        #text-container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 10px 6px; 
            width: 100%;
        }

        .word { 
            display: none; 
            font-size: 22px; 
            line-height: 1.6; 
            word-break: break-all; 
            font-weight: 500;
            color: #333;
        }
        .word.show { display: inline; }
        
        /* 💡 수정 1: 내부 스크롤 제거. 내용물이 많아지면 전체 웹페이지 자체가 스크롤됨 */
        #verses-list {
            text-align: left; 
        }
        .verse-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 15px;
            border-left: 4px solid #28a745; 
        }
        .verse-item-ref {
            font-size: 16px;
            font-weight: bold;
            color: #218838;
            margin-bottom: 8px;
        }
        .verse-item-text {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            word-break: keep-all;
        }

        #loading { font-size: 18px; color: #666; margin: auto; }
    </style>
</head>
<body>

    <div id="loading">스프레드시트에서 성경 구절을 불러오는 중...</div>

    <div id="mode-selection" style="display: none;">
        <h1>장충교회 제자훈련 기말시험</h1>
        <h2>학습 모드를 선택하세요</h2>
        <button class="btn-all" onclick="startApp('view-all')">📋 모든 구절 보기</button>
        <div style="border-top: 1px solid #eee; margin: 5px 0;"></div>
        <button onclick="startApp('sequential')">🔁 순서대로 외우기</button>
        <button onclick="startApp('random')">🔀 무작위로 외우기</button>
    </div>

    <div id="main-app" style="display: none;">
        <div class="controls">
            <button class="btn-home" onclick="goHome()">🏠 처음</button>
            <button class="btn-prev" onclick="prevVerse()">⬅️ 이전</button>
            <button class="btn-next" onclick="nextVerse()">다음 ➡️</button>
        </div>

        <p class="hint-text">화면(흰 박스)을 클릭하면 다음 단어가 하나씩 나옵니다.</p>

        <div id="verse-box" onclick="showNextWord()">
            <div id="info"></div>
            <div id="text-container"></div>
        </div>
    </div>

    <div id="all-verses-view" style="display: none;">
        <div class="controls">
            <button class="btn-home" onclick="goHome()">🏠 처음으로</button>
        </div>
        
        <div id="verses-list"></div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTGe7VnD_JygmgPQRQqGFt6kyz9B31y9W9071YsQBHxhr_xqIvc_9p5d9HVSlI_SizijuoMkNE62noL/pub?output=csv";
        
        let bibleDB = [];
        let currentWords = [];
        let currentWordIndex = 0;
        
        // 💡 4번 로직: 모드 및 순서 관리를 위한 변수들
        let currentMode = 'random';
        let currentVerseIndex = -1; // 순서대로 모드용 인덱스
        
        let randomHistory = []; // 무작위 모드에서 지나온 구절 기억
        let randomPointer = -1; // 현재 히스토리에서 몇 번째를 보고 있는지

        async function loadBibleData() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                bibleDB = parseCSV(csvText);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mode-selection').style.display = 'flex';
            } catch (error) {
                console.error("데이터를 불러오는 중 오류 발생:", error);
                document.getElementById('loading').innerText = "스프레드시트 데이터를 불러오지 못했습니다. URL이나 공유 설정을 확인해 주세요.";
            }
        }

        function parseCSV(text) {
            const lines = text.split("\n");
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const parts = lines[i].split(",");
                if (parts.length >= 2) {
                    const reference = parts[0].replace(/"/g, "").trim();
                    const text = parts.slice(1).join(",").replace(/"/g, "").trim(); 
                    
                    result.push({ reference, text });
                }
            }
            return result;
        }

        function startApp(mode) {
            document.getElementById('mode-selection').style.display = 'none';

            if (mode === 'view-all') {
                document.getElementById('all-verses-view').style.display = 'flex';
                renderAllVerses();
            } else {
                currentMode = mode;
                
                // 모드를 켤 때마다 학습 기록 초기화
                currentVerseIndex = -1; 
                randomHistory = [];
                randomPointer = -1;

                document.getElementById('main-app').style.display = 'flex';
                nextVerse();
            }
        }

        function goHome() {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('all-verses-view').style.display = 'none'; 
            document.getElementById('mode-selection').style.display = 'flex';
            
            // 페이지 상단으로 스크롤 끌어올리기
            window.scrollTo(0, 0); 
        }

        function renderAllVerses() {
            const container = document.getElementById('verses-list');
            container.innerHTML = ""; 
            
            if (bibleDB.length === 0) return;

            bibleDB.forEach((verse, index) => {
                const item = document.createElement('div');
                item.className = 'verse-item';
                
                const ref = document.createElement('div');
                ref.className = 'verse-item-ref';
                ref.innerText = `${index + 1}. ${verse.reference}`;
                
                const text = document.createElement('div');
                text.className = 'verse-item-text';
                text.innerText = verse.text;
                
                item.appendChild(ref);
                item.appendChild(text);
                container.appendChild(item);
            });
        }

        // 💡 4번 로직: 다음 구절 처리
        function nextVerse() {
            if (bibleDB.length === 0) return;

            if (currentMode === 'random') {
                // 이미 기억된 히스토리가 뒤에 남아있다면 그걸 보여줌 (이전으로 돌아갔다 다시 올 때)
                if (randomPointer < randomHistory.length - 1) {
                    randomPointer++;
                    renderSingleVerse(randomHistory[randomPointer]);
                } else {
                    // 새로운 무작위 구절 뽑기
                    const newIdx = Math.floor(Math.random() * bibleDB.length);
                    randomHistory.push(newIdx);
                    randomPointer++;
                    renderSingleVerse(newIdx);
                }
            } else {
                // 순서대로 모드: 다음 인덱스로 (마지막이면 처음으로)
                currentVerseIndex = (currentVerseIndex + 1) % bibleDB.length;
                renderSingleVerse(currentVerseIndex);
            }
        }

        // 💡 4번 로직: 이전 구절 처리
        function prevVerse() {
            if (bibleDB.length === 0) return;

            if (currentMode === 'random') {
                // 무작위 모드: 저장해둔 히스토리에서 뒤로 가기
                if (randomPointer > 0) {
                    randomPointer--;
                    renderSingleVerse(randomHistory[randomPointer]);
                } else {
                    alert("첫 번째 구절입니다."); // 더 이상 돌아갈 곳이 없을 때
                }
            } else {
                // 순서대로 모드: 이전 인덱스로 (처음이면 맨 마지막으로)
                currentVerseIndex = (currentVerseIndex - 1 + bibleDB.length) % bibleDB.length;
                renderSingleVerse(currentVerseIndex);
            }
        }

        // 화면에 구절을 뿌려주는 공통 함수
        function renderSingleVerse(index) {
            const verse = bibleDB[index];
            document.getElementById('info').innerText = verse.reference;
            
            currentWords = verse.text.split(" ");
            currentWordIndex = 0;

            const container = document.getElementById('text-container');
            container.innerHTML = "";
            
            currentWords.forEach(word => {
                const span = document.createElement('span');
                span.innerText = word;
                span.className = 'word';
                container.appendChild(span);
            });
        }

        function showNextWord() {
            const spans = document.querySelectorAll('.word');
            if (currentWordIndex < spans.length) {
                spans[currentWordIndex].classList.add('show');
                currentWordIndex++;
            }
        }

        loadBibleData();
    </script>
</body>
</html>
