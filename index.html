<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="장충교회 제자훈련 기말시험">
    <meta property="og:description" content="구글 스프레드시트와 연동된 성경 암기 연습 프로그램">
    <meta property="og:type" content="website">

    <title>장충교회 제자훈련 기말시험</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f9f9f9; 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            padding: 20px;
        }

        h1 { 
            font-size: 26px; 
            margin-bottom: 25px;
            color: #333; 
            word-break: keep-all; 
        }

        .view-title {
            font-size: 20px;
            font-weight: bold;
            color: #444;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        #mode-selection {
            margin: auto;
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #mode-selection h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #555;
        }

        button.btn-exam { background: #6f42c1; }
        button.btn-exam:hover { background: #5a32a3; }

        #main-app, #all-verses-view, #exam-view, #exam-result-view { 
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            display: flex; 
            flex-direction: column;
        }

        .controls {
            display: flex;
            gap: 8px; 
            width: 100%;
            margin-bottom: 10px; 
        }

        button { 
            padding: 12px 5px; 
            font-size: 15px; 
            cursor: pointer; 
            border-radius: 5px; 
            border: none; 
            background: #007bff; 
            color: white; 
            font-weight: bold; 
        }
        
        #mode-selection button { width: 100%; padding: 15px 10px; }
        
        button:hover { background: #0056b3; }
        button.btn-all { background: #28a745; }
        button.btn-all:hover { background: #218838; }
        
        .controls button { flex: 1; }
        
        button.btn-home { background: #6c757d; }
        button.btn-home:hover { background: #5a6268; }
        
        button.btn-prev { background: #17a2b8; }
        button.btn-prev:hover { background: #138496; }

        .hint-text { 
            color: #aaa; 
            margin-bottom: 15px; 
            font-size: 13px; 
            word-break: keep-all; 
        }

        #verse-box { 
            width: 100%;
            min-height: 60vh; 
            padding: 30px 20px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; 
        }
        
        #info { 
            font-size: 18px; 
            color: #222; 
            font-weight: bold; 
            margin-bottom: 25px; 
            background: #f0f0f0;
            padding: 6px 16px;
            border-radius: 20px;
        }

        #text-container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 10px 6px; 
            width: 100%;
        }

        .word { 
            display: none; 
            font-size: 22px; 
            line-height: 1.6; 
            word-break: break-all; 
            font-weight: 500;
            color: #333;
        }
        .word.show { display: inline; }
        
        #verses-list { text-align: left; }
        
        .verse-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 15px;
            border-left: 4px solid #28a745; 
        }
        .verse-item-ref {
            font-size: 16px;
            font-weight: bold;
            color: #218838;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .verse-item-text {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            word-break: keep-all;
        }

        .verse-item.inactive {
            border-left: 4px solid #999;
            background: #f4f4f4;
        }
        .verse-item.inactive .verse-item-ref {
            color: #777;
        }
        .verse-item.inactive .verse-item-text {
            color: #555;
        }

        .exam-list { text-align: left; margin-bottom: 20px; }
        .exam-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
        .exam-item-ref { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 12px; }
        .exam-input-wrap { display: flex; flex-direction: column; gap: 8px; }
        
        .exam-textarea {
            width: 100%;
            height: 175px; 
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: none;
            font-family: sans-serif;
            line-height: 1.5;
        }
        .exam-textarea:focus { border-color: #6f42c1; outline: none; }
        
        .score-box {
            background: #6f42c1; color: white; padding: 20px; border-radius: 12px;
            font-size: 22px; font-weight: bold; margin-bottom: 25px;
        }
        .result-item {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; text-align: left;
        }
        .result-item.correct { border-left: 5px solid #28a745; }
        .result-item.wrong { border-left: 5px solid #dc3545; }
        
        .result-status { font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .result-status.correct { color: #28a745; }
        .result-status.wrong { color: #dc3545; }
        
        .result-ref { font-size: 17px; font-weight: bold; color: #333; margin-bottom: 10px; }
        .result-text-box { font-size: 15px; margin-top: 5px; line-height: 1.5; }
        .result-label { font-weight: bold; color: #666; }

        .word-correct { color: #28a745; font-weight: bold; }
        .word-wrong { color: #dc3545; font-weight: bold; }
        .word-missing { color: #0f5132; font-weight: bold; text-decoration: underline; }

        #loading { font-size: 18px; color: #666; margin: auto; }
    </style>
</head>
<body>

    <div id="loading">데이터를 불러오는 중...</div>

    <div id="mode-selection" style="display: none;">
        <h1>장충교회 제자훈련 기말시험</h1>
        <h2>학습 모드를 선택하세요</h2>
        <button class="btn-all" onclick="startApp('view-all')">📋 모든 구절 보기</button>
        <div style="border-top: 1px solid #eee; margin: 5px 0;"></div>
        <button onclick="startApp('sequential')">🔁 순서대로 외우기</button>
        <button onclick="startApp('random')">🔀 무작위로 외우기</button>
        <div style="border-top: 1px solid #eee; margin: 5px 0;"></div>
        <button class="btn-exam" onclick="startApp('exam')">📝 모의고사 응시하기</button>
    </div>

    <div id="main-app" style="display: none;">
        <div id="app-title" class="view-title"></div>
        <div class="controls">
            <button class="btn-home" onclick="goHome()">🏠 처음</button>
            <button class="btn-prev" onclick="prevVerse()">⬅️ 이전</button>
            <button class="btn-next" onclick="nextVerse()">다음 ➡️</button>
        </div>
        <p class="hint-text">화면(흰 박스)을 클릭하면 다음 단어가 하나씩 나옵니다.</p>
        <div id="verse-box" onclick="showNextWord()">
            <div id="info"></div>
            <div id="text-container"></div>
        </div>
    </div>

    <div id="all-verses-view" style="display: none;">
        <div class="view-title">모든 구절 보기</div>
        <div class="controls">
            <button class="btn-home" onclick="goHome()">🏠 처음으로</button>
            <button class="btn-all" style="background: #28a745;" onclick="saveMemorized()">💾 저장</button>
            <button class="btn-home" style="background: #dc3545;" onclick="resetMemorized()">🔄 초기화</button>
        </div>
        <p class="hint-text" style="margin-top: 5px; margin-bottom: 15px; color: #e65100; font-weight: bold; font-size: 14px;">
            외운 구절을 체크하고 저장하면 외우기 메뉴에서 나타나지 않습니다.
        </p>
        <div id="verses-list"></div>
    </div>

    <div id="exam-view" style="display: none;">
        <div class="view-title">📝 주관식 모의고사 (10문항)</div>
        <div class="controls">
            <button class="btn-home" onclick="goHome()">🏠 포기하고 처음으로</button>
        </div>
        
        <div id="exam-questions" class="exam-list"></div>
        
        <button class="btn-all" style="padding:15px; font-size:18px; margin-bottom:40px;" onclick="gradeExam()">💯 채점하기</button>
    </div>

    <div id="exam-result-view" style="display: none;">
        <div class="view-title">💯 모의고사 채점 결과</div>
        
        <div id="score-display" class="score-box"></div>
        
        <div class="controls">
            <button class="btn-home" style="padding:15px;" onclick="goHome()">🏠 메인 화면으로 돌아가기</button>
        </div>
        
        <div id="exam-results" class="exam-list"></div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTGe7VnD_JygmgPQRQqGFt6kyz9B31y9W9071YsQBHxhr_xqIvc_9p5d9HVSlI_SizijuoMkNE62noL/pub?output=csv";
        
        let bibleDB = [];
        let activeVerses = []; // 외우기 메뉴에서 활용할 (체크 제외된) 실제 활성 배열
        
        let currentWords = [];
        let currentWordIndex = 0;
        
        let currentMode = 'random';
        let currentVerseIndex = -1; 
        
        let randomHistory = []; 
        let randomPointer = -1; 

        let examVerses = [];

        async function loadBibleData() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                bibleDB = parseCSV(csvText);
                
                // 오름차순 정렬 (숫자 크기 기준)
                bibleDB.sort((a, b) => a.no - b.no);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mode-selection').style.display = 'flex';
            } catch (error) {
                console.error("데이터를 불러오는 중 오류 발생:", error);
                document.getElementById('loading').innerText = "데이터를 불러오지 못했습니다. URL이나 공유 설정을 확인해 주세요.";
            }
        }

        function parseCSV(text) {
            const lines = text.split("\n");
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const line = lines[i].replace(/\r/g, "");
                const parts = line.split(",");
                
                if (parts.length >= 4) {
                    const rawNo = parts[0].replace(/"/g, "").trim();
                    const no = parseInt(rawNo, 10);
                    const reference = parts[1].replace(/"/g, "").trim();
                    const gimal_yn = parseInt(parts[parts.length - 1].replace(/"/g, "").trim(), 10);
                    
                    const verseText = parts.slice(2, parts.length - 1).join(",").replace(/"/g, "").trim(); 
                    
                    result.push({ no, rawNo, reference, text: verseText, gimal_yn });
                }
            }
            return result;
        }

        function startApp(mode) {
            document.getElementById('mode-selection').style.display = 'none';

            if (mode === 'view-all') {
                document.getElementById('all-verses-view').style.display = 'flex';
                renderAllVerses();
            } else if (mode === 'exam') {
                document.getElementById('exam-view').style.display = 'flex';
                setupExam();
            } else {
                currentMode = mode;
                
                // 💡 암기 완료 처리(체크박스 저장값)를 가져와서 기말 범위(gimal_yn=1) 중 미암기 성구만 필터링
                const memorizedList = JSON.parse(localStorage.getItem('memorized_verses') || '[]');
                activeVerses = bibleDB.filter(verse => verse.gimal_yn === 1 && !memorizedList.includes(verse.no));

                // 만약 기말 범구 전체를 다 체크해서 외운 경우의 예외 처리
                if (activeVerses.length === 0) {
                    alert("기말고사 범위의 모든 구절을 암기하셨습니다! '모든 구절 보기'에서 체크를 해제하거나 초기화해 주세요.");
                    goHome();
                    return;
                }

                const titleElement = document.getElementById('app-title');
                if (mode === 'sequential') {
                    titleElement.innerText = "순서대로 외우기";
                } else if (mode === 'random') {
                    titleElement.innerText = "무작위로 외우기";
                }
                
                currentVerseIndex = -1; 
                randomHistory = [];
                randomPointer = -1;

                document.getElementById('main-app').style.display = 'flex';
                nextVerse();
            }
        }

        function goHome() {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('all-verses-view').style.display = 'none'; 
            document.getElementById('exam-view').style.display = 'none'; 
            document.getElementById('exam-result-view').style.display = 'none'; 
            document.getElementById('mode-selection').style.display = 'flex';
            
            window.scrollTo(0, 0); 
        }

        function renderAllVerses() {
            const container = document.getElementById('verses-list');
            container.innerHTML = ""; 
            
            if (bibleDB.length === 0) return;

            // 로컬 스토리지에서 암기 완료된 no 목록 확보
            const memorizedList = JSON.parse(localStorage.getItem('memorized_verses') || '[]');

            const activeItems = bibleDB.filter(v => v.gimal_yn === 1);
            const inactiveItems = bibleDB.filter(v => v.gimal_yn === 0);

            const renderItem = (verse, isActive) => {
                const item = document.createElement('div');
                item.className = 'verse-item' + (isActive ? '' : ' inactive');
                
                const ref = document.createElement('div');
                ref.className = 'verse-item-ref';
                
                // 💡 gimal_yn 이 1인 구절에 한해서만 체크박스 생성
                if (isActive) {
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'memorized-checkbox';
                    checkbox.dataset.no = verse.no; // 식별자 매핑
                    checkbox.checked = memorizedList.includes(verse.no);
                    checkbox.style.marginRight = '10px';
                    checkbox.style.transform = 'scale(1.2)';
                    checkbox.style.cursor = 'pointer';
                    ref.appendChild(checkbox);
                }

                const textSpan = document.createElement('span');
                textSpan.innerText = `${verse.rawNo}. ${verse.reference}`;
                ref.appendChild(textSpan);
                
                const text = document.createElement('div');
                text.className = 'verse-item-text';
                text.innerText = verse.text;
                
                item.appendChild(ref);
                item.appendChild(text);
                container.appendChild(item);
            };

            activeItems.forEach(v => renderItem(v, true));
            inactiveItems.forEach(v => renderItem(v, false));
        }

        // 💡 추가기능 1: 체크박스 상태 저장 함수
        function saveMemorized() {
            const checkboxes = document.querySelectorAll('.memorized-checkbox');
            const memorizedList = [];

            checkboxes.forEach(cb => {
                if (cb.checked) {
                    memorizedList.push(parseInt(cb.dataset.no, 10));
                }
            });

            localStorage.setItem('memorized_verses', JSON.stringify(memorizedList));
            alert("암기 완료 상태가 안전하게 저장되었습니다.");
        }

        // 💡 추가기능 2: 체크박스 해제 및 저장소 초기화 함수
        function resetMemorized() {
            if (confirm("외운 구절 체크를 전부 해제하고 초기화하시겠습니까?")) {
                const checkboxes = document.querySelectorAll('.memorized-checkbox');
                checkboxes.forEach(cb => cb.checked = false);
                
                localStorage.removeItem('memorized_verses');
                alert("체크 상태가 초기화되었습니다.");
            }
        }

        function setupExam() {
            const container = document.getElementById('exam-questions');
            container.innerHTML = "";
            
            // 모의고사는 외움 여부와 상관없이 gimal_yn = 1 전체 풀에서 출제합니다.
            const examPool = bibleDB.filter(verse => verse.gimal_yn === 1);

            if (examPool.length === 0) {
                container.innerHTML = "<p>등록된 기말고사 범위 데이터가 없습니다.</p>";
                return;
            }

            const shuffled = [...examPool].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, Math.min(10, examPool.length));
            examVerses = selected.sort((a, b) => a.no - b.no);

            examVerses.forEach((verse, index) => {
                const item = document.createElement('div');
                item.className = 'exam-item';
                
                const refDiv = document.createElement('div');
                refDiv.className = 'exam-item-ref';
                refDiv.innerText = `Q${index + 1}. ${verse.reference}`;
                
                const inputWrap = document.createElement('div');
                inputWrap.className = 'exam-input-wrap';
                
                const textarea = document.createElement('textarea');
                textarea.className = 'exam-textarea';
                textarea.id = `exam-input-${index}`;
                textarea.placeholder = "여기에 성경 구절 정답을 입력하세요.";
                
                inputWrap.appendChild(textarea);
                item.appendChild(refDiv);
                item.appendChild(inputWrap);
                container.appendChild(item);
            });
        }

        function cleanText(text) {
            return text.replace(/[\s\.\,\?\!\'\"“”‘’]/g, "");
        }

        function buildAnalyzedHTML(originalText, userText) {
            const origWords = originalText.split(/\s+/);
            const userWords = userText.split(/\s+/);
            const m = origWords.length;
            const n = userWords.length;
            
            const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
            
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (cleanText(origWords[i - 1]) === cleanText(userWords[j - 1])) {
                        dp[i][j] = dp[i - 1][j - 1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                    }
                }
            }
            
            let i = m, j = n;
            const htmlChunks = [];
            
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && cleanText(origWords[i - 1]) === cleanText(userWords[j - 1])) {
                    htmlChunks.push(`<span class="word-correct">${userWords[j - 1]}</span>`);
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
                    htmlChunks.push(`<span class="word-wrong">${userWords[j - 1]}</span>`);
                    j--;
                } else if (i > 0 && (j === 0 || dp[i][j - 1] < dp[i - 1][j])) {
                    htmlChunks.push(`<span class="word-missing">${origWords[i - 1]}</span>`);
                    i--;
                }
            }
            
            return htmlChunks.reverse().join(" ");
        }

        function gradeExam() {
            const resultsContainer = document.getElementById('exam-results');
            resultsContainer.innerHTML = "";
            
            let score = 0;

            examVerses.forEach((verse, index) => {
                const userInput = document.getElementById(`exam-input-${index}`).value.trim();
                
                const isCorrect = cleanText(userInput) === cleanText(verse.text);
                if (isCorrect) score++;

                const resultCard = document.createElement('div');
                resultCard.className = `result-item ${isCorrect ? 'correct' : 'wrong'}`;
                
                const statusDiv = document.createElement('div');
                statusDiv.className = `result-status ${isCorrect ? 'correct' : 'wrong'}`;
                statusDiv.innerText = isCorrect ? "⭕ 정답" : "❌ 오답";
                
                const refDiv = document.createElement('div');
                refDiv.className = 'result-ref';
                refDiv.innerText = `Q${index + 1}. ${verse.reference}`;
                
                let displayedUserResponse = "";
                if (isCorrect) {
                    displayedUserResponse = `<span class="word-correct">${userInput}</span>`;
                } else {
                    displayedUserResponse = userInput === "" ? "(입력 없음)" : buildAnalyzedHTML(verse.text, userInput);
                }

                const textBox = document.createElement('div');
                textBox.className = 'result-text-box';
                textBox.innerHTML = `
                    <p><span class="result-label">정답:</span> ${verse.text}</p>
                    <p style="margin-top: 7px;">
                        <span class="result-label">내 답변:</span> ${displayedUserResponse}
                    </p>
                `;
                
                resultCard.appendChild(statusDiv);
                resultCard.appendChild(refDiv);
                resultCard.appendChild(textBox);
                resultsContainer.appendChild(resultCard);
            });

            document.getElementById('score-display').innerText = `🎯 내 점수: ${score} / ${examVerses.length} 문항 맞춤 (${Math.round((score/examVerses.length)*100)}점)`;

            document.getElementById('exam-view').style.display = 'none';
            document.getElementById('exam-result-view').style.display = 'flex';
            
            window.scrollTo(0, 0);
        }

        function nextVerse() {
            if (activeVerses.length === 0) return;

            if (currentMode === 'random') {
                if (randomPointer < randomHistory.length - 1) {
                    randomPointer++;
                    renderSingleVerse(randomHistory[randomPointer]);
                } else {
                    const newIdx = Math.floor(Math.random() * activeVerses.length);
                    randomHistory.push(newIdx);
                    randomPointer++;
                    renderSingleVerse(newIdx);
                }
            } else {
                currentVerseIndex = (currentVerseIndex + 1) % activeVerses.length;
                renderSingleVerse(currentVerseIndex);
            }
        }

        function prevVerse() {
            if (activeVerses.length === 0) return;

            if (currentMode === 'random') {
                if (randomPointer > 0) {
                    randomPointer--;
                    renderSingleVerse(randomHistory[randomPointer]);
                } else {
                    alert("첫 번째 구절입니다."); 
                }
            } else {
                currentVerseIndex = (currentVerseIndex - 1 + activeVerses.length) % activeVerses.length;
                renderSingleVerse(currentVerseIndex);
            }
        }

        function renderSingleVerse(index) {
            const verse = activeVerses[index];
            document.getElementById('info').innerText = verse.reference;
            
            currentWords = verse.text.split(" ");
            currentWordIndex = 0;

            const container = document.getElementById('text-container');
            container.innerHTML = "";
            
            currentWords.forEach(word => {
                const span = document.createElement('span');
                span.innerText = word;
                span.className = 'word';
                container.appendChild(span);
            });
        }

        function showNextWord() {
            const spans = document.querySelectorAll('.word');
            if (currentWordIndex < spans.length) {
                spans[currentWordIndex].classList.add('show');
                currentWordIndex++;
            }
        }

        loadBibleData();
    </script>
</body>
</html>
