<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장충교회 제자훈련 기말시험</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9; }
        h1 { font-size: 28px; margin-top: 30px; color: #333; word-break: keep-all; }
        
        /* 모바일 화면에서 박스가 너무 커지지 않도록 padding과 너비 조정 */
        #verse-box { 
            margin: 30px auto; 
            padding: 25px; 
            max-width: 600px; 
            background: white; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            cursor: pointer; 
            min-height: 150px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* ★ 핵심 수정: 단어들이 박스를 벗어나지 않고 아래로 줄바꿈 되도록 설정 */
        #text-container {
            display: flex;
            flex-wrap: wrap; /* 단어가 넘치면 자동으로 줄바꿈 */
            justify-content: center;
            gap: 8px 6px; /* 단어 사이의 가로/세로 간격 */
            width: 100%;
        }

        .word { 
            display: none; 
            font-size: 22px; 
            line-height: 1.6; 
            word-break: break-all; /* 단어 안에서도 필요하면 잘려 내려가게 함 */
        }
        .word.show { display: inline; }
        
        #info { font-size: 18px; color: #666; font-weight: bold; margin-bottom: 20px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; font-weight: bold; }
        button:hover { background: #0056b3; }
        #loading { font-size: 18px; color: #666; }
        .hint-text { color: #999; margin-top: 15px; font-size: 14px; word-break: keep-all; }
    </style>
</head>
<body>

    <h1>장충교회 제자훈련 기말시험</h1>
    <button onclick="nextVerse()">다음 구절</button>

    <div id="verse-box" onclick="showNextWord()">
        <div id="loading">스프레드시트에서 성경 구절을 불러오는 중...</div>
        <div id="info" style="display:none;"></div>
        <div id="text-container"></div>
    </div>
    <p class="hint-text">화면(흰 박스)을 클릭하면 다음 단어가 하나씩 나옵니다.</p>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTGe7VnD_JygmgPQRQqGFt6kyz9B31y9W9071YsQBHxhr_xqIvc_9p5d9HVSlI_SizijuoMkNE62noL/pub?output=csv";
        
        let bibleDB = [];
        let currentWords = [];
        let currentWordIndex = 0;

        async function loadBibleData() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                bibleDB = parseCSV(csvText);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('info').style.display = 'block';
                
                nextVerse();
            } catch (error) {
                console.error("데이터를 불러오는 중 오류 발생:", error);
                document.getElementById('loading').innerText = "스프레드시트 데이터를 불러오지 못했습니다. URL이나 공유 설정을 확인해 주세요.";
            }
        }

        function parseCSV(text) {
            const lines = text.split("\n");
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const parts = lines[i].split(",");
                if (parts.length >= 2) {
                    const reference = parts[0].replace(/"/g, "").trim();
                    const text = parts.slice(1).join(",").replace(/"/g, "").trim(); 
                    
                    result.push({ reference, text });
                }
            }
            return result;
        }

        function nextVerse() {
            if (bibleDB.length === 0) return;

            const randomVerse = bibleDB[Math.floor(Math.random() * bibleDB.length)];
            
            document.getElementById('info').innerText = randomVerse.reference;
            
            currentWords = randomVerse.text.split(" ");
            currentWordIndex = 0;

            const container = document.getElementById('text-container');
            container.innerHTML = "";
            
            currentWords.forEach(word => {
                const span = document.createElement('span');
                span.innerText = word;
                span.className = 'word';
                container.appendChild(span);
            });
        }

        function showNextWord() {
            const spans = document.querySelectorAll('.word');
            if (currentWordIndex < spans.length) {
                spans[currentWordIndex].classList.add('show');
                currentWordIndex++;
            }
        }

        loadBibleData();
    </script>
</body>
</html>
