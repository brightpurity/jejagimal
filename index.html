<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장충교회 제자훈련 기말시험</title>
    <style>
        /* 기본 여백 제거 및 전체 화면 높이 맞춤 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f9f9f9; 
            display: flex;
            flex-direction: column;
            height: 100vh; /* 화면 전체 높이 사용 */
            padding: 20px;
        }

        h1 { 
            font-size: 24px; 
            margin-top: 15px; 
            margin-bottom: 10px;
            color: #333; 
            word-break: keep-all; 
        }

        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 5px; 
            border: none; 
            background: #007bff; 
            color: white; 
            font-weight: bold; 
            margin-bottom: 15px;
            width: 100%;
            max-width: 600px;
            align-self: center;
        }
        button:hover { background: #0056b3; }
        
        /* ★ 핵심 수정: 처음부터 화면을 가득 채우는 큼직한 박스 설정 */
        #verse-box { 
            margin: 0 auto;
            padding: 30px 20px; 
            width: 100%;
            max-width: 600px; 
            flex: 1; /* 남은 화면 높이를 전부 차지 */
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; /* 장절 정보는 위에 고정 */
            align-items: center; 
            overflow-y: auto; /* 내용이 아주 많으면 박스 내부 스크롤 */
        }
        
        #info { 
            font-size: 18px; 
            color: #222; 
            font-weight: bold; 
            margin-bottom: 25px; 
            background: #f0f0f0;
            padding: 6px 16px;
            border-radius: 20px;
        }

        #text-container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 10px 6px; 
            width: 100%;
        }

        .word { 
            display: none; 
            font-size: 22px; 
            line-height: 1.6; 
            word-break: break-all; 
            font-weight: 500;
            color: #333;
        }
        .word.show { display: inline; }
        
        #loading { font-size: 18px; color: #666; margin-top: 50px; }
        .hint-text { color: #aaa; margin-top: 12px; font-size: 13px; word-break: keep-all; }
    </style>
</head>
<body>

    <h1>장충교회 제자훈련 기말시험</h1>
    <button onclick="nextVerse()">다음 구절</button>

    <div id="verse-box" onclick="showNextWord()">
        <div id="loading">스프레드시트에서 성경 구절을 불러오는 중...</div>
        <div id="info" style="display:none;"></div>
        <div id="text-container"></div>
    </div>
    <p class="hint-text">화면(흰 박스)을 클릭하면 다음 단어가 하나씩 나옵니다.</p>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTGe7VnD_JygmgPQRQqGFt6kyz9B31y9W9071YsQBHxhr_xqIvc_9p5d9HVSlI_SizijuoMkNE62noL/pub?output=csv";
        
        let bibleDB = [];
        let currentWords = [];
        let currentWordIndex = 0;

        async function loadBibleData() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                bibleDB = parseCSV(csvText);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('info').style.display = 'inline-block';
                
                nextVerse();
            } catch (error) {
                console.error("데이터를 불러오는 중 오류 발생:", error);
                document.getElementById('loading').innerText = "스프레드시트 데이터를 불러오지 못했습니다. URL이나 공유 설정을 확인해 주세요.";
            }
        }

        function parseCSV(text) {
            const lines = text.split("\n");
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const parts = lines[i].split(",");
                if (parts.length >= 2) {
                    const reference = parts[0].replace(/"/g, "").trim();
                    const text = parts.slice(1).join(",").replace(/"/g, "").trim(); 
                    
                    result.push({ reference, text });
                }
            }
            return result;
        }

        function nextVerse() {
            if (bibleDB.length === 0) return;

            const randomVerse = bibleDB[Math.floor(Math.random() * bibleDB.length)];
            
            document.getElementById('info').innerText = randomVerse.reference;
            
            currentWords = randomVerse.text.split(" ");
            currentWordIndex = 0;

            const container = document.getElementById('text-container');
            container.innerHTML = "";
            
            currentWords.forEach(word => {
                const span = document.createElement('span');
                span.innerText = word;
                span.className = 'word';
                container.appendChild(span);
            });
        }

        function showNextWord() {
            const spans = document.querySelectorAll('.word');
            if (currentWordIndex < spans.length) {
                spans[currentWordIndex].classList.add('show');
                currentWordIndex++;
            }
        }

        loadBibleData();
    </script>
</body>
</html>
