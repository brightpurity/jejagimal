<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>장충교회 제자훈련 기말시험</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background-color: #f9f9f9; 
            display: flex;
            flex-direction: column;
            height: 100vh; 
            padding: 20px;
        }

        h1 { 
            font-size: 24px; 
            margin-top: 15px; 
            margin-bottom: 15px;
            color: #333; 
            word-break: keep-all; 
        }

        /* 최초 모드 선택 화면 스타일 */
        #mode-selection {
            margin: auto;
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #mode-selection h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #555;
        }

        /* 학습 화면 전체를 감싸는 영역 */
        #main-app { 
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            flex: 1; 
            display: flex; 
            flex-direction: column;
        }

        /* 상단 컨트롤 영역 */
        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 10px; /* 안내 문구와의 간격을 위해 살짝 조정 */
        }

        button { 
            padding: 12px 10px; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 5px; 
            border: none; 
            background: #007bff; 
            color: white; 
            font-weight: bold; 
        }
        
        #mode-selection button {
            width: 100%;
        }
        
        button:hover { background: #0056b3; }
        
        .controls button {
            flex: 1;
        }
        button.btn-home {
            background: #6c757d;
        }
        button.btn-home:hover { background: #5a6268; }

        /* 💡 수정: 안내 메시지가 버튼과 박스 사이에 예쁘게 위치하도록 여백 조정 */
        .hint-text { 
            color: #aaa; 
            margin-bottom: 15px; 
            font-size: 13px; 
            word-break: keep-all; 
        }

        /* 본문 암기 박스 스타일 */
        #verse-box { 
            width: 100%;
            flex: 1; 
            padding: 30px 20px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: center; 
            overflow-y: auto; 
        }
        
        #info { 
            font-size: 18px; 
            color: #222; 
            font-weight: bold; 
            margin-bottom: 25px; 
            background: #f0f0f0;
            padding: 6px 16px;
            border-radius: 20px;
        }

        #text-container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            gap: 10px 6px; 
            width: 100%;
        }

        .word { 
            display: none; 
            font-size: 22px; 
            line-height: 1.6; 
            word-break: break-all; 
            font-weight: 500;
            color: #333;
        }
        .word.show { display: inline; }
        
        #loading { font-size: 18px; color: #666; margin: auto; }
    </style>
</head>
<body>

    <h1>장충교회 제자훈련 기말시험</h1>

    <!-- 로딩 화면 -->
    <div id="loading">스프레드시트에서 성경 구절을 불러오는 중...</div>

    <!-- 1. 최초 모드 선택 화면 -->
    <div id="mode-selection" style="display: none;">
        <h2>학습 모드를 선택하세요</h2>
        <button onclick="startApp('sequential')">🔁 순서대로 외우기</button>
        <button onclick="startApp('random')">🔀 무작위로 외우기</button>
    </div>

    <!-- 2. 실제 암기 학습 화면 -->
    <div id="main-app" style="display: none;">
        <div class="controls">
            <button class="btn-home" onclick="goHome()">🏠 처음으로</button>
            <button onclick="nextVerse()">다음 구절 ➡️</button>
        </div>

        <!-- 💡 위치 변경: 버튼 박스와 아래 흰 박스 사이로 안내 메시지 이동 -->
        <p class="hint-text">화면(흰 박스)을 클릭하면 다음 단어가 하나씩 나옵니다.</p>

        <div id="verse-box" onclick="showNextWord()">
            <div id="info"></div>
            <div id="text-container"></div>
        </div>
    </div>

    <script>
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTGe7VnD_JygmgPQRQqGFt6kyz9B31y9W9071YsQBHxhr_xqIvc_9p5d9HVSlI_SizijuoMkNE62noL/pub?output=csv";
        
        let bibleDB = [];
        let currentWords = [];
        let currentWordIndex = 0;
        
        let currentMode = 'random';
        let sequentialIndex = 0;

        async function loadBibleData() {
            try {
                const response = await fetch(csvUrl);
                const csvText = await response.text();
                
                bibleDB = parseCSV(csvText);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mode-selection').style.display = 'flex';
            } catch (error) {
                console.error("데이터를 불러오는 중 오류 발생:", error);
                document.getElementById('loading').innerText = "스프레드시트 데이터를 불러오지 못했습니다. URL이나 공유 설정을 확인해 주세요.";
            }
        }

        function parseCSV(text) {
            const lines = text.split("\n");
            const result = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                const parts = lines[i].split(",");
                if (parts.length >= 2) {
                    const reference = parts[0].replace(/"/g, "").trim();
                    const text = parts.slice(1).join(",").replace(/"/g, "").trim(); 
                    
                    result.push({ reference, text });
                }
            }
            return result;
        }

        function startApp(mode) {
            currentMode = mode;
            sequentialIndex = 0;

            document.getElementById('mode-selection').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';

            nextVerse();
        }

        function goHome() {
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('mode-selection').style.display = 'flex';
        }

        function nextVerse() {
            if (bibleDB.length === 0) return;

            let selectedVerse;

            if (currentMode === 'random') {
                selectedVerse = bibleDB[Math.floor(Math.random() * bibleDB.length)];
            } else {
                selectedVerse = bibleDB[sequentialIndex];
                sequentialIndex = (sequentialIndex + 1) % bibleDB.length;
            }
            
            document.getElementById('info').innerText = selectedVerse.reference;
            
            currentWords = selectedVerse.text.split(" ");
            currentWordIndex = 0;

            const container = document.getElementById('text-container');
            container.innerHTML = "";
            
            currentWords.forEach(word => {
                const span = document.createElement('span');
                span.innerText = word;
                span.className = 'word';
                container.appendChild(span);
            });
        }

        function showNextWord() {
            const spans = document.querySelectorAll('.word');
            if (currentWordIndex < spans.length) {
                spans[currentWordIndex].classList.add('show');
                currentWordIndex++;
            }
        }

        loadBibleData();
    </script>
</body>
</html>
